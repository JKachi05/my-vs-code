<body>
  <!-- A variable is a container for storing data -->
  <!-- We can use variables to store different types of data such as numbers, strings, and booleans -->
  <script>
    let variabble1 = 3;
    console.log(variabble1);

    let calculation = 2 + 2;
    console.log(calculation);
    console.log(2 + calculation);
    console.log(calculation + 2);

    let result = calculation + 2;
    console.log(result);

    let message = "Hello, World!";
    console.log(message);
