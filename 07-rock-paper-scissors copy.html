      <title>Rock paper scissor</title>

    <body>
      <p>Rock paper scissor</p>

      <button onclick="
      pickComputerMove();

      let result = '';

      if (computerMove === 'rock' ) {
        result = 'Tie';
      } else if (computerMove === 'paper') {
        result = 'You lose';
      } else if (computerMove === 'scissor') {
        result = 'You win';
      }

      alert(`you picked rock, computer picked ${computerMove}, ${result}`);
      // scope of variables: computerMove is only accessible within the if blocks where it is defined. If we try to access computerMove outside of those blocks, we will get an error because it is not defined in that scope.
      // A scope limits where a variable exists and help us avoid naming coflicts.
      
      
      ">Rock</button>

      <button
      onclick="
      pickComputerMove();

      let result = '';

      if (computerMove === 'rock' ) {
        result = 'win';
      } else if (computerMove === 'paper') {
        result = 'Tie';
      } else if (computerMove === 'scissor') {
        result = 'You lose';
      }

      alert(`you picked paper, computer picked ${computerMove}, ${result}`);
      ">Paper</button>

      <button
      onclick="
      console.log(pickComputerMove());

      let result = '';

      if (computerMove === 'rock' ) {
        result = 'you lose';
      } else if (computerMove === 'paper') {
        result = 'You win';
      } else if (computerMove === 'scissor') {
        result = 'Tie';
      }

      alert(`you picked scissors, computer picked ${computerMove}, ${result}`);
      ">Scissor</button>
      <script>

        let computerMove = '';

        function pickComputerMove() {
          const randomNumber = (Math.random());

          if (randomNumber >= 0 && randomNumber < 1 / 3) {
            computerMove = 'rock';
          } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
            computerMove = 'paper';
          } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
            computerMove = 'scissor';
          }
          console.log('Before'); 
          return computerMove; // returning a value from a function
          console.log('After'); 
        }
      </script>
    </body>
