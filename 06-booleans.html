    // A boolean value represente wheater something is true or false. It can only be one of those two values. Booleans are often used in conditional statements to control the flow of a program. For example, you might use a boolean to check if a user is logged in or if a certain condition is met before executing a block of code.

    3 < 5 // This expression evaluates to true because 3 is less than 5

      // Truthy and falsy values: In JavaScript, certain values are considered "truthy" or "falsy" when evaluated in a boolean context. A truthy value is any value that is considered true when evaluated in a boolean context, while a falsy value is any value that is considered false. The following values are considered falsy in JavaScript: false, 0, -0, 0n (BigInt zero), "", null, undefined, and NaN. All other values are considered truthy. For example, the following values are considered truthy: true, 1, -1, "hello", [], {}, and function() {}.

      console.log(Boolean(false)); // This will print false because false is a falsy value
      console.log(Boolean(0)); // This will print false because 0 is a falsy value
      console.log(Boolean(-0)); // This will print false because -0 is a falsy value
      console.log(Boolean(0n)); // This will print false because 0n (BigInt zero) is a falsy value
      console.log(Boolean("")); // This will print false because an empty string is a falsy value
      console.log(Boolean(null)); // This will print false because null is a falsy value      
      console.log(Boolean(undefined)); // This will print false because undefined is a falsy value
      console.log(Boolean(NaN)); // This will print false because NaN is a falsy value
      console.log(Boolean(true)); // This will print true because true is a truthy value
      console.log(Boolean(1)); // This will print true because 1 is a truthy value
      console.log(Boolean(-1)); // This will print true because -1 is a truthy value
      console.log(Boolean("hello")); // This will print true because a non-empty string is a truthy value
      console.log(Boolean([])); // This will print true because an empty array is a truthy value
      console.log(Boolean({})); // This will print true because an empty object is a truthy value
      console.log(Boolean(function() {})); // This will print true because a function is a truthy value
