        function  convertToFahrenheit(celsius) {
            let formula = ((celsius * 9 / 5) + 32);
            console.log(formula);
        }
        convertToFahrenheit(25);

        function  convertTocelsius(Fahrenheit) {
            let formula = ((Fahrenheit - 32) * 5 / 9);
            console.log(formula);
        }
        convertTocelsius(86);

        function  convertTemperature(degree, unit) {
            formula = ((degree * 9 / 5) + 32);
            console.log(formula);

            formula = ((unit - 32) * 5 / 9);
            console.log(formula);
        }
        convertTemperature(25, 86);
