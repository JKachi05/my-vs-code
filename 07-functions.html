        // why do we use functions?
        // 1. Reusability: Functions can be called multiple times without rewriting the same code.
        // 2. Maintainability: If you need to change the behavior of a function, you only have to do it in one place.
        // 3. Readability: Functions make the code more readable and easier to understand.

        // function functionName() {

        // Rules for function names:
        // 1. Function names must start with a letter, underscore, or dollar sign.
        // 2. Function names cannot contain spaces or special characters (except underscore and dollar sign).
        // 3. Function names are case-sensitive.
        // 4. Function names should be descriptive and indicate what the function does.
        // 5. can't start with a number.

        // best practice = use camelCase for function names

        // Note this Return = gets a value out of a function

        // A parameter is a variable that is used to pass information into a function.
        // parameter = puts a value into a function

        //parameter and argument are often used interchangeably, but they have different meanings. A parameter is a variable that is defined in the function declaration and is used to receive a value when the function is called. An argument, on the other hand, is the actual value that is passed to the function when it is called.

        // it fully exixt inside a function and can't be accessed outside of it. This is called local scope. Variables that are defined outside of a function have global scope and can be accessed from anywhere in the code.

        function calculateTax(cost, taxPercent = 0.1) {
            console.log(cost * taxPercent)
        }

            calculateTax(2000); // 100
            calculateTax(5000); // 500
